name: Build Termux AArch64

on:
  push:
  pull_request:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  TARGET: aarch64-linux-android
  API_LEVEL: 24

jobs:
  build-termux:
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        run: |
          rustup default stable
          rustup target add $TARGET

      - name: Setup Android NDK
        uses: android-actions/setup-android@v3

      - name: Install NDK
        run: |
          sdkmanager "ndk;29.0.13846066"

      - name: Configure linker
        run: |
          NDK="$ANDROID_SDK_ROOT/ndk/29.0.13846066"
          TOOLCHAIN="$NDK/toolchains/llvm/prebuilt/linux-x86_64"

          echo "CC_${TARGET//-/_}=$TOOLCHAIN/bin/aarch64-linux-android${API_LEVEL}-clang" >> $GITHUB_ENV
          echo "CARGO_TARGET_AARCH64_LINUX_ANDROID_LINKER=$TOOLCHAIN/bin/aarch64-linux-android${API_LEVEL}-clang" >> $GITHUB_ENV

      - name: Build CLI
        run: |
          cargo build \
            --release \
            --target $TARGET \
            --bin czkawka_cli \
            --features "blake_pure"

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: czkawka-cli-termux-aarch64
          path: target/aarch64-linux-android/release/czkawka_cli
